# Maestro que gerencia multiplos containers

services:
  echo-server:
    build: ./servidor
    container_name: echo-server
    ports:
      - "5000:5000"
    environment:
      - ECHO_PORT=5000

  echo-client:
    build: ./cliente
    container_name: echo-client
    depends_on:
      - echo-server
    environment:
      - ECHO_HOST=echo-server
      - ECHO_PORT=5000
      - ECHO_MESSAGE=Olá do cliente echo!
